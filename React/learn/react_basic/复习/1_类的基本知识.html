<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1_类的基本知识</title>
</head>

<body>
  <script>
    // 创建一个 Person 类
    class Person {
      // 构造器方法
      constructor(name, age) {
        this.name = name;
        this.age = age;
      }

      // 一般方法
      speak() {
        // speak方法放在 类的原型对象上，供实例使用
        // speak中的this 是调用 该方法的this指向
        console.log(`我叫${this.name}, 我的年龄是${this.age}`);
      }
    }

    class Studnet extends Person {
      constructor(name, age, grade) {
        super(name, age)
        this.grade = grade
      }
      speak() {
        console.log(`我叫${this.name}, 我的年龄是${this.age}, 我读的是${this.grade}年级`);
        this.study()
      }

      study() {
        console.log('我在认真学习');
      }
    }
    let p1 = new Person('tom', 18)
    let p2 = new Person('jerry', 19)

    // console.log(p1);
    // console.log(p2);

    // p1.speak()
    // p2.speak()
    // p2.speak.call({name: 'call'})

    let s1 = new Studnet('huhe', 18)
    console.log(s1);
    s1.speak()

    class Car {
      constructor(name, price) {
        this.name = name
        this.price = price
      }
      // 类里面可以直接写赋值语句
      // 
      a = 1
    }
    const c1 = new Car('bmw', 20)
    console.log(c1);
  </script>
</body>

</html>
