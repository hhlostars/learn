<body>
  <script>
    class Person {
      constructor(name, age) {
        // this 指向实例对象
        this.name = name;
        this.age = age
      }

      speak() {
        console.log(`我叫${this.name},年龄是${this.age}`);
      }
    }

    class Student extends Person {
      constructor(name, age, grade) {
        super(name, age)
        this.grade = grade
      }
      speak() {
        console.log(`我叫${this.name},年龄是${this.age},年龄是${this.grade}`);
      }
    }

    const p1 = new Person('hh', 24)
    const p2 = new Person('vv', 24)

    const s1 = new Student('ss', 22, '高一')

  </script>
