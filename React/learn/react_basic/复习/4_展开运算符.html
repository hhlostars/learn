<body>
  <script>
    let arr1 = [1, 3, 5, 7, 9]
    let arr2 = [2, 4, 6, 8, 10]
    console.log(arr1);
    console.log(...arr1);

    let arr3 = [...arr1, ...arr2]
    console.log(arr3);

    function sum(...args) {
      console.log(arguments);
      console.log(args);

      return args.reduce((prev, curr) => prev + curr)
    }

    sum(1, 2, 3)
    console.log(sum(1, 2, 3));

    let person = {name: 'huhe', age: 19}
    let person2 = {...person}
    person.name = 'kkk'
    console.log(person2.name);

    let person3 = {...person, name:'jiji'}
    console.log(person3);
  </script>
