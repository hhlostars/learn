<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3_真实DOM与虚拟DOM</title>
</head>
<body>
  <!-- 准备好容器 -->
  <div id="test">
  
  </div>
  
  <!-- 引入react 核心库 -->
  <script type="text/javascript" src="../js/react.development.js"></script>
  
  <!-- 引入react-dom 支持react操作dom-->
  <script type="text/javascript" src="../js/react-dom.development.js"></script>
  <!-- 引入babel 将 jsx 转换成 js -->
  <script type="text/javascript" src="../js/babel.min.js"></script>
  
  
  <script type="text/javascript">
    // 创建虚拟dom
    // const VDOM = React.createElement(标签名, 标签属性, 标签内容)
    // const VDOM = React.createElement('h1', {id: 'title'}, '<span>hello, react</span>')
    const VDOM = React.createElement('h1', {id: 'title'}, React.createElement('span', {id: 'title'}, 'hello, react'))
    // 渲染虚拟dom 到页面
    ReactDOM.render(VDOM, document.getElementById('test'))

    const TDOM = document.getElementById('test')
    console.log('虚拟dom', VDOM);
    console.log('真实dom', TDOM);

    /*
      关于虚拟dom
        1.本质是object 对象
        2.虚拟dom 较轻 真实dom 较重， 因为虚拟dom 是react内部再用 无需真实dom 那么多属性
        3.虚拟dom最终会转换为真实dom 呈现在页面上

    */
    debugger
  </script>
</body>
</html>
