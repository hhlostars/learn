<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <!-- 准备好一个容器 -->
  <div id="app">

  </div>

  <!-- 引入核心库 -->
  <script src="../../js/react.development.js"></script>

  <!-- 引入react-dom -->
  <script src="../../js/react-dom.development.js"></script>

  <!-- 将jsx转换成js -->
  <script src="../../js/babel.min.js"></script>

  <!-- 此处一定要写 babel -->
  <script type="text/babel">
    //  创建vdom
    const VDOM = <h1>Hello React</h1>
    // let that
    class MyComponent extends React.Component {
      constructor(props) {
        // console.log(this);
        // 构造器中的this 指向当前的实例对象
        super(props)
        this.state = { isHot: false, wind: '微风' }
        // this.changeWether = this.changeWether.bind(this)
      }

      changeWether = () => {
        // 直接在onClick上的回调不行
        // 1.由于changeWether是作为onClick的回调，所以不是实例调用的 是直接调用的
        // 2.类中的方法默认开启了严格模式，所以changeWether中的this为undefined

        // 状态不可直接更改
        // this.state.isHot = !this.state.isHot
        const isHot = this.state.isHot
        this.setState({ isHot: !isHot })
        console.log(this.state.wind);
      }

      render() {
        // render 是 react 是实例对象
        console.log(this);
        // 读取状态
        const { isHot } = this.state
        return (
          <h1 onClick={this.changeWether}>今天天气很{isHot ? '炎热' : '凉爽'},有大风</h1>
        )
      }
    }
    // 渲染虚拟DOM到页面
    ReactDOM.render(<MyComponent />, document.getElementById('app'))

    // function changeWether() {
    //   // let self = this
    //   that.state.isHot = !that.state.isHot
    //   console.log(that.state.isHot);
    // }
  </script>
</body>

</html>
