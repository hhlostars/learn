  <!-- 此处一定要写 babel -->
  <script type="text/babel">
    // 创建函数式组件
    // 大写
    // function Demo() {
    //   console.log(this);
    //   return <h2>我是用函数定义的组件</h2>

    // 类创建
    // 必须继承
    // 必须render
    class Weather extends React.Component {
      constructor(props) {
        super(props)
        this.state = {
          isHot: true
        }
      }
      render() {
        console.log(this);
        return <h2 onClick={this.demo.bind(this)}>今天天气很，{this.state.isHot ? '炎热' : '寒冷'}</h2>
      }

      demo() {
            console.log('demo');
            console.log(this);
          this.state.isHot = !this.state.isHot
      }
    }

    ReactDOM.render(<Weather />, document.getElementById('app'))

  </script>
