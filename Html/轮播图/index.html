<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      /* margin: 0; */
      padding: 0%;
    }
    .container {
      width: 655px;
      margin: 0 auto;
      overflow: hidden;
    }
    #banner {
      height: 250px;
      width: 3275px;
    }
    li {
      float: left;
      width: 655px;
      height: 250px;
      list-style: none;
    }
    img {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <div class="container">
    <ul id="banner">
      <li><img src="./lunbo1.png" alt=""></li>
      <li><img src="./lunbo2.png" alt=""></li>
      <li><img src="./lunbo3.png" alt=""></li>
      <li><img src="./lunbo4.png" alt=""></li>
      <li><img src="./lunbo1.png" alt=""></li>
    </ul>
  </div>

  <script>
    let banner = document.getElementById('banner')
    let currentIndex = 0
    let maxLen = document.getElementById('banner').getElementsByTagName('li').length - 1
    console.log(maxLen);


    setInterval(changeBanner, 1000);

    function changeBanner() {
      if(currentIndex < maxLen) {
        currentIndex++
        goNext()
      } else {
        currentIndex = 0
        reset()
      }
    }

    function goNext() {
      // let banner = document.getElementById('banner')
      banner.style.marginLeft = '-' + currentIndex * 655 + 'px'
      banner.style.transition = '0.3s'
    }
    function reset() {
      // let banner = document.getElementById('banner')
      banner.style.marginLeft = 0
      banner.style.transition = '0s'
    }
  </script>
</body>
</html>
