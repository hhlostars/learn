<body>
  <script>

    function def(obj, key, value, enumerable) {
      Object.defineProperty(obj, key, {
        value,
        enumerable,
        writable: true,
        configurable: true
      })
    }

    class Name {
      constructor(val) {
        console.log(this);
        def(val, '__ob__', this, false)
      }
      speak() {
        console.log(123);
      }
    }
    let obj = {data: 123}
    let n = new Name(obj)
    // console.log(n);
    console.log(obj);
  </script>
</body>
