<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>

  <input type="text" id="el" oninput="deChange()">

  <script>
    function debounce(fn, wait, immediate = false) {
      let timer = null;
      // 设置flag 判断是否完成了 一次防抖
      let flag = false;

      return function (...args) {
        if (timer) {
          clearTimeout(timer)
        }
        if (immediate && !flag) {
          fn.apply(this, args)
          flag = true
        } else {
          timer = setTimeout(() => {
            fn.apply(this, args)
            flag = false
          }, wait);
        }
      }
    }

    deChange = debounce(function () {
      console.log('change');
    }, 500, true)

    window.onresize = debounce(function () {
      console.log('change_window');
    }, 500)
  </script>
</body>

</html>
