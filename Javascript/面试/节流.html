    // setTimeout
    function throttle(fn, wait) {
      let timer = null
      return function (...args) {

        if (!timer) {
          timer = setTimeout(() => {
            timer = null
            fn.apply(this, args)
          }, wait);
        }

      }
    }

    throttleChange = throttle(function () {
      console.log('change');
    }, 2000)
